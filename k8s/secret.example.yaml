# k8s/secret.example.yaml, COMMITTED template with placeholder values.
#
# Before running apply.sh:
#   cp k8s/secret.example.yaml k8s/secret.yaml
#   # Edit k8s/secret.yaml to fill in real values (see below).
#   # k8s/secret.yaml is gitignored, never commit it.
#
# apply.sh references k8s/secret.yaml directly, so the demo fails fast
# if this step was skipped instead of silently running with placeholder
# credentials.
#
# Generate the JWT secrets with:
#   node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
#
# Run that command twice, once per secret. The two secrets MUST differ
# (the refresh-token signing key is intentionally separate from the
# access-token signing key so a leak of one does not compromise both).
#
# DATABASE_URL hostname is `postgres-service` (the ClusterIP Service from
# postgres-service.yaml). Kubernetes DNS resolves it inside the cluster;
# the API never sees an IP address.
#
# Stripe vars (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET) are intentionally
# absent. Stripe (Task 12) is deferred post-HD per the 2026-05-22 scope
# amendment. When Task 12 ships, uncomment the block at the bottom and
# add both keys to Render/local env in lockstep, see EXECUTION_LOG.

apiVersion: v1
kind: Secret
metadata:
  name: feastbox-secret
type: Opaque
stringData:
  # POSTGRES_PASSWORD: consumed by the postgres StatefulSet at boot to
  # set the password for POSTGRES_USER. The api reuses it via the
  # DATABASE_URL below, keep both in sync.
  POSTGRES_PASSWORD: REPLACE_WITH_RANDOM_PASSWORD_AT_LEAST_24_CHARS

  # DATABASE_URL: the api pod resolves `postgres-service` via in-cluster
  # DNS. Port 5432 is the internal ClusterIP port (NOT 5433, that host
  # mapping is a compose dev convenience, not a K8s concern).
  DATABASE_URL: postgresql://feastbox:REPLACE_WITH_RANDOM_PASSWORD_AT_LEAST_24_CHARS@postgres-service:5432/feastbox

  # JWT secrets: see generation hint above. Must be distinct.
  JWT_SECRET: REPLACE_WITH_64_HEX_CHARS_GENERATED_VIA_CRYPTO_RANDOMBYTES
  JWT_REFRESH_SECRET: REPLACE_WITH_A_DIFFERENT_64_HEX_CHARS

  # Stripe (DEFERRED, uncomment when Task 12 / Stripe checkout ships):
  # STRIPE_SECRET_KEY: sk_live_REPLACE_OR_USE_sk_test_FOR_DEV
  # STRIPE_WEBHOOK_SECRET: whsec_REPLACE_WITH_VALUE_FROM_STRIPE_DASHBOARD

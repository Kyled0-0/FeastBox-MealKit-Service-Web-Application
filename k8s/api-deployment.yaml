# k8s/api-deployment.yaml, Express API workload.
#
# 2 replicas baseline so the HPA has somewhere to scale FROM. With a
# single replica baseline, the demo recording cannot show "replicas
# went from N to N+M under load" because N=1 + the scale-up to 2 looks
# like a fluke. Starting at 2 makes the scale event unambiguous on
# camera.
#
# Image: `feastbox-api:latest` matches what `docker compose build api`
# produces. imagePullPolicy: Never tells K8s to use Docker Desktop's
# local image cache (which is shared with the docker daemon). Without
# this, K8s tries to pull from docker.io/library/feastbox-api and fails
# with ImagePullBackOff, the most common foot-gun for first-time Docker
# Desktop K8s users.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: feastbox-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feastbox-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # During a rollout, never let pod count drop below 1, otherwise
      # the LoadBalancer Service routes to nothing and the demo blips.
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: feastbox-api
    spec:
      containers:
        - name: api
          image: feastbox-api:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            # Secret + ConfigMap merge into a flat env namespace. Order
            # matters when keys collide (later wins), by convention,
            # Secrets come AFTER ConfigMaps so a secret can override a
            # default. Today there is no key collision, but the
            # convention matters for future contributors.
            - configMapRef:
                name: feastbox-config
            - secretRef:
                name: feastbox-secret
          # Resource requests/limits are required by HPA, without them
          # the autoscaler cannot compute "% of requested CPU used" and
          # the scale event never fires. The numbers are conservative
          # so a single Docker Desktop node can host 5 replicas (the
          # HPA max) without CPU pressure.
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Probes target GET /health which returns immediately with
          # { status: 'ok' } and does NOT touch the DB. Intentional
          # decoupling: a DB outage MUST NOT kill api pods (readiness
          # probe pulls traffic, liveness keeps the pod alive so it
          # can recover when the DB comes back).
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            # Longer initialDelaySeconds for liveness so a slow boot
            # never gets killed mid-startup. The readiness probe gates
            # traffic; liveness only fires on a hung process.
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # Non-root user is baked into the Dockerfile (USER node), so
          # no securityContext override needed here. Repeating the
          # constraint as a runAsNonRoot guard would be belt-and-braces
          # if the image ever changed, added below for defence in
          # depth.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Prisma writes to /tmp
            capabilities:
              drop: ["ALL"]

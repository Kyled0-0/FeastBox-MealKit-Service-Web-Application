# In-cluster Container Registry. Deployed as an HD-evidence resource
# (ULO1: distinct cloud resource; ULO4: represents the build-tag-push-pull
# lifecycle). NOT used as the actual pull source on Docker Desktop kind,
# because that cluster's containerd routes pulls through an internal
# mirror that doesn't proxy custom registries -- the api/migration
# manifests use imagePullPolicy: Never and apply.sh loads images via
# `ctr import` instead. In a production cluster the same registry would
# be the real pull source.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500

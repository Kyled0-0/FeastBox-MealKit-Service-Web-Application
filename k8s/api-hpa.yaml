# Scales the api Deployment 2-5 replicas at 60% CPU. Requires
# metrics-server installed in the cluster (see DEMO_RUNBOOK.txt step A.2).
# stabilizationWindowSeconds: 0 on scale-up so scale events appear quickly
# in the demo (default 5-minute window would hide them).

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feastbox-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feastbox-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feastbox
      POSTGRES_PASSWORD: feastbox_dev
      POSTGRES_DB: feastbox
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feastbox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

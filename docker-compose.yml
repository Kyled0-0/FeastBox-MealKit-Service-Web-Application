# Local dev stack. `db` matches the Phase 4 K8s StatefulSet's image and
# port; `api` builds from the same Dockerfile used in Phase 4.
#
# Quick start:
#   docker compose up --build       # full stack
#   docker compose up -d db         # DB only (then `npm --prefix server run dev` on host)
#   docker compose run --rm api node prisma/seed.js   # seed once
#
# IMPORTANT: after editing the Dockerfile, ALWAYS pass --build:
#   docker compose up --build
# Otherwise compose reuses the cached image and Dockerfile changes don't apply.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feastbox
      POSTGRES_PASSWORD: feastbox_dev
      POSTGRES_DB: feastbox
    ports:
      # 5433 (not 5432) avoids the native Windows Postgres port conflict.
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # -d feastbox probes the app DB, not the default maintenance DB.
      test: ["CMD-SHELL", "pg_isready -U feastbox -d feastbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: feastbox-api:latest
    depends_on:
      db:
        condition: service_healthy
    # JWT secrets come from server/.env (gitignored). Copy server/.env.example
    # to server/.env and fill in real values before `docker compose up`.
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://feastbox:feastbox_dev@db:5432/feastbox
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "127.0.0.1:3000:3000"
    restart: on-failure
    # `exec` so node replaces sh and becomes tini's direct child; without
    # exec, SIGTERM goes to sh and clean shutdown breaks.
    command: ["sh", "-c", "npx prisma migrate deploy && exec node server.js"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
